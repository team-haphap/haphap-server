services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5433:5432"
    networks:
      - haphap-net

  redis:
    image: redis:7
    restart: always
    ports:
      - "6379:6379"
    networks:
      - haphap-net

networks:
  haphap-net:
    name: haphap-net
    driver: bridge