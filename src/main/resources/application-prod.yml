spring:
  datasource:
    url: jdbc:postgresql://${RDS_ENDPOINT}:5432/haphap
    username: ${RDS_USERNAME}
    password: ${RDS_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

management:
  endpoint:
    health:
      show-details: never

jwt:
  secret: ${JWT_SECRET}