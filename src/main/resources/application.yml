spring:
  application:
    name: haphap

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 1

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

jwt:
  secret: ${JWT_SECRET}

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ap-northeast-2

admin:
  login-id: ${ADMIN_LOGIN_ID:}
  password-hash: ${ADMIN_PASSWORD_HASH:}
  name: ${ADMIN_NAME:}

logging:
  config: classpath:logback-spring.xml